name: Deploy Supabase

on:
  push:
    branches: [main]
    paths:
      - 'supabase/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run SQL migrations
        env:
          PAT: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          for f in $(ls supabase/migrations/*.sql 2>/dev/null | sort); do
            echo "▶ $f"
            SQL=$(cat "$f")
            BODY=$(jq -n --arg q "$SQL" '{"query": $q}')
            HTTP=$(curl -s -o /tmp/migration_response.json -w "%{http_code}" -X POST \
              "https://api.supabase.com/v1/projects/uucxyuqxqjpbxecemdvf/database/query" \
              -H "Authorization: Bearer $PAT" \
              -H "Content-Type: application/json" \
              -d "$BODY")
            echo "  HTTP $HTTP: $(cat /tmp/migration_response.json)"
            if [ "$HTTP" -ge 400 ]; then
              echo "❌ Migration failed"
              exit 1
            fi
            echo "  ✓"
          done

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy all edge functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          for fn in supabase/functions/*/; do
            name=$(basename "$fn")
            echo "▶ Deploying $name..."
            supabase functions deploy "$name" --project-ref uucxyuqxqjpbxecemdvf
            echo "  ✓ $name deployed"
          done
