name: Drip Emails

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  drip:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger drip-emails edge function
        run: |
          curl -X POST \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            --fail \
            "https://uucxyuqxqjpbxecemdvf.supabase.co/functions/v1/drip-emails"
