<html lang="en">
<head>
  <meta charset="UTF-8"/>

  <meta name="description" content="CFA Level 1, 2 & 3 exam prep with AI-personalized sessions, spaced repetition, and live pass probability. Free to start."/>

  <!-- Open Graph / Social sharing -->
  <meta property="og:type" content="website"/>
  <meta property="og:url" content="https://praneethgollamudi.github.io/ClearCFA/"/>
  <meta property="og:title" content="ClearCFA — AI-Powered CFA Exam Prep"/>
  <meta property="og:description" content="Every session targets your weakest CFA topics. AI questions anchored to official 2026 LOS. Free tier: 20 AI questions/day."/>
  <meta property="og:image" content="https://praneethgollamudi.github.io/ClearCFA/og-image.png"/>
  <meta name="twitter:card" content="summary_large_image"/>

  <meta name="twitter:description" content="Every session targets your weakest CFA topics. AI questions anchored to official 2026 LOS. Free tier: 20 AI questions/day."/>
  <meta name="twitter:image" content="https://praneethgollamudi.github.io/ClearCFA/og-image.png"/>

  <!-- PWA -->
  <link rel="manifest" href="/ClearCFA/manifest.json"/>
  <meta name="theme-color" content="#7c3aed"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="ClearCFA"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--app-bg,#0a0a14);min-height:100vh;font-family:system-ui,-apple-system,sans-serif;transition:background 0.2s;}
    #root{max-width:440px;margin:0 auto;}
    @media(min-width:600px){#root{max-width:600px;}}
    @media(min-width:900px){#root{max-width:860px;}}
    @media(min-width:1200px){#root{max-width:1020px;}}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
    @keyframes glow{0%,100%{box-shadow:0 0 8px #7c3aed33}50%{box-shadow:0 0 20px #7c3aed66}}
    @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
    @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
    @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
    @keyframes slideDown{from{transform:translateY(0)}to{transform:translateY(100%)}}
    @keyframes fadeOut{from{opacity:1}to{opacity:0}}
  </style>
</head>
<body>
  <div id="root"></div>
  <div id="toast-root"></div>
  <div id="nav-root"></div>
  <script src="react.min.js"></script>
  <script src="react-dom.min.js"></script>
  <script src="app.js?v=1789200000"></script>
  
</body>
</html>
